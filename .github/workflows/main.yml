name: Isradata Auto Poster

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests cloudscraper

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Bot Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Перед запуском бота гарантируем, что файл базы актуален
          git pull origin main --rebase || echo "No remote changes"
          python bot.py

      - name: Save database changes
        run: |
          git add sent_jobs.txt
          if git diff --staged --quiet; then
            echo "Нет новых вакансий."
          else
            git commit -m "Update sent_jobs.txt [skip ci]"
            # Используем push с защитой от конфликтов
            git push origin main
          fi

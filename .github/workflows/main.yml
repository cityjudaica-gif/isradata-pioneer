name: Isradata Auto Poster

on:
  schedule:
    - cron: '*/30 * * * *' # Запуск каждые 30 минут
  workflow_dispatch: # Возможность запустить вручную кнопкой

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      # Убираем предупреждение о Node.js
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Загружаем всю историю для корректного push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests cloudscraper

      - name: Run Bot Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Save database changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Гарантируем наличие файла базы
          touch sent_jobs.txt
          
          git add sent_jobs.txt
          
          # Сначала забираем свежую версию с сервера, чтобы избежать ошибок синхронизации
          git pull origin main --rebase
          
          # Коммитим и пушим только если есть изменения
          if git diff --staged --quiet; then
            echo "Новых данных для сохранения нет."
          else
            git commit -m "Update sent_jobs.txt [skip ci]"
            git push origin main
          fi

name: Isradata Auto Poster

on:
  schedule:
    # Запуск каждые 30 минут
    - cron: '*/30 * * * *'
  workflow_dispatch: # Позволяет запускать вручную кнопкой

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Дает право записывать файл обратно в репозиторий
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Важно: забираем историю, чтобы push прошел гладко
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests cloudscraper

      - name: Run Bot Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Save database changes
        run: |
          # Проверяем, существует ли файл, если нет - создаем
          touch sent_jobs.txt
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add sent_jobs.txt
          
          # Коммитим только если есть изменения
          if git diff --staged --quiet; then
            echo "Нет новых вакансий для сохранения."
          else
            git commit -m "Update sent_jobs.txt [skip ci]"
            git push origin main
          fi
